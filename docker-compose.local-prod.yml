version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: tikur_abay_local
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-tikurabay}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-tikurabay123}
    volumes:
      - minio_data:/data

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.local-prod
    ports:
      - "6012:6012"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - backend_uploads:/app/var/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:6012/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 12

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 6010
      NEXT_PUBLIC_API_URL: http://backend:6012/api/v1
      NEXT_PUBLIC_API_HEALTH_URL: http://backend:6012/api/v1/health
    ports:
      - "6010:6010"
    depends_on:
      backend:
        condition: service_healthy

  customer-portal:
    build:
      context: .
      dockerfile: apps/customer-portal/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 6011
      NEXT_PUBLIC_API_URL: http://backend:6012/api/v1
    ports:
      - "6011:6011"
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "6080:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      admin:
        condition: service_started
      customer-portal:
        condition: service_started
      backend:
        condition: service_healthy

volumes:
  mongo_data:
  redis_data:
  minio_data:
  backend_uploads:
